services:
  - type: web
    name: hyperreality-key-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npx tsx src/server.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CORS_ORIGIN
        value: https://hyperreality-key.onrender.com
      - key: JWT_SECRET
        generateValue: true
