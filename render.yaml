services:
  - type: web
    name: hyperreality-key-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CORS_ORIGIN
        value: https://hyperreality-key.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
